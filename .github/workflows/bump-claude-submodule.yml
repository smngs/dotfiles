name: Bump claude submodule

on:
  repository_dispatch:
    types: [claude-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.SUBMODULE_TOKEN }}

      - name: Update submodule to latest main
        run: git submodule update --remote home/.claude

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet home/.claude || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR and enable auto-merge
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="feature/bump-claude-submodule-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add home/.claude
          git commit -m "[update] bump smngs/claude submodule to latest main"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "[update] bump smngs/claude submodule to latest main" \
            --body "Auto-generated PR to update the claude submodule to the latest main." \
            --base main \
            --head "$BRANCH")

          gh pr merge "$PR_URL" --auto --merge
